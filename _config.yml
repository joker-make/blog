title: Joker Make Blog
subtitle: 免费部署版
description: 基于 Hexo 和 GitHub Pages 的个人技术博客
keywords:
author: joker-make
language: zh-CN
timezone: Asia/Shanghai

url: https://joker-make.github.io/blog
root: /blog/
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''

index_generator:
  path: ''
  per_page: 10
  order_by: -date
archive_generator:
  per_page: 10
  yearly: true
  monthly: true
category_generator:
  per_page: 10
tag_generator:
  per_page: 10

theme: landscape

deploy:
  type:
